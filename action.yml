name: Agent Evidence Gate
description: Verify AI coding agent work with an evidence scorecard before human review.
author: Agent Evidence Gate

inputs:
  agents-path:
    description: Path to AGENTS.md or another policy file.
    required: false
    default: AGENTS.md
  evidence-path:
    description: Path to a Markdown file containing verification evidence.
    required: false
    default: evidence.md
  format:
    description: Output format: text, markdown, or json.
    required: false
    default: markdown
  threshold:
    description: Optional score threshold overriding AGENTS.md min_score.
    required: false
    default: ""
  allow-protected-paths:
    description: Set to true only from a maintainer-controlled workflow when protected path changes are expected.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Prepare trusted policy and diff
      shell: bash
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        AGENTS_PATH: ${{ inputs.agents-path }}
      run: |
        set -euo pipefail

        if [ -n "$BASE_SHA" ]; then
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          git show "$BASE_SHA:$AGENTS_PATH" > "$RUNNER_TEMP/agent-evidence-policy.md"
          git diff --unified=0 "$BASE_SHA" HEAD > "$RUNNER_TEMP/agent-evidence.diff"
        else
          cp "$AGENTS_PATH" "$RUNNER_TEMP/agent-evidence-policy.md"
          git diff --unified=0 HEAD~1 HEAD > "$RUNNER_TEMP/agent-evidence.diff"
        fi

    - name: Write pull request body
      shell: bash
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
      run: |
        printf '%s\n' "$PR_BODY" > "$RUNNER_TEMP/agent-evidence-pr-body.md"

    - name: Run evidence gate
      shell: bash
      env:
        AGENTS_PATH: ${{ inputs.agents-path }}
        EVIDENCE_PATH: ${{ inputs.evidence-path }}
        FORMAT: ${{ inputs.format }}
        THRESHOLD: ${{ inputs.threshold }}
        ALLOW_PROTECTED_PATHS: ${{ inputs.allow-protected-paths }}
      run: |
        set -euo pipefail
        THRESHOLD_ARG=()
        if [ -n "$THRESHOLD" ]; then
          THRESHOLD_ARG=(--threshold "$THRESHOLD")
        fi
        PROTECTED_ARG=()
        if [ "$ALLOW_PROTECTED_PATHS" = "true" ]; then
          PROTECTED_ARG=(--allow-protected-paths)
        fi

        node "$GITHUB_ACTION_PATH/bin/agent-evidence-gate.js" check \
          --agents "$RUNNER_TEMP/agent-evidence-policy.md" \
          --policy-path "$AGENTS_PATH" \
          --diff "$RUNNER_TEMP/agent-evidence.diff" \
          --evidence "$EVIDENCE_PATH" \
          --pr-body "$RUNNER_TEMP/agent-evidence-pr-body.md" \
          --format "$FORMAT" \
          "${THRESHOLD_ARG[@]}" \
          "${PROTECTED_ARG[@]}"

branding:
  icon: check-circle
  color: green
